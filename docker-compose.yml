services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lobslab
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/api/overview || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./tunnel-credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      traefik:
        condition: service_started
    networks:
      - lobslab

  lobslab-home:
    build:
      context: ./home
    restart: unless-stopped
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      - TRAEFIK_API=http://traefik:8080
    volumes:
      - home-data:/app/data
    networks:
      - lobslab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lobslab-home.rule=Host(`home.lobslab.com`)"
      - "traefik.http.routers.lobslab-home.entrypoints=web"
      - "traefik.http.services.lobslab-home.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  crapuler:
    build:
      context: ../lobslab-apps/apps/crapuler
    restart: unless-stopped
    networks:
      - lobslab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crapuler.rule=Host(`crapuler.lobslab.com`)"
      - "traefik.http.routers.crapuler.entrypoints=web"
      - "traefik.http.services.crapuler.loadbalancer.server.port=4317"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4317/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ballz:
    build:
      context: ../lobslab-apps/apps/ballz
    restart: unless-stopped
    networks:
      - lobslab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ballz.rule=Host(`ballz.lobslab.com`)"
      - "traefik.http.routers.ballz.entrypoints=web"
      - "traefik.http.services.ballz.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  stellar-siege:
    build:
      context: ../lobslab-apps/apps/stellar-siege
    restart: unless-stopped
    networks:
      - lobslab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stellar-siege.rule=Host(`stellar-siege.lobslab.com`)"
      - "traefik.http.routers.stellar-siege.entrypoints=web"
      - "traefik.http.services.stellar-siege.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ballz-royale:
    build:
      context: ../lobslab-apps/apps/ballz-royale
    restart: unless-stopped
    networks:
      - lobslab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ballz-royale.rule=Host(`ballz-royale.lobslab.com`)"
      - "traefik.http.routers.ballz-royale.entrypoints=web"
      - "traefik.http.services.ballz-royale.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  games:
    build:
      context: ../lobslab-apps/apps/games
    restart: unless-stopped
    networks:
      - lobslab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.games.rule=Host(`games.lobslab.com`)"
      - "traefik.http.routers.games.entrypoints=web"
      - "traefik.http.services.games.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  home-data:

networks:
  lobslab:
    name: lobslab
    driver: bridge
