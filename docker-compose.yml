services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lobslab

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./tunnel-credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - traefik
    networks:
      - lobslab

  lobslab-home:
    build:
      context: ./home
    restart: unless-stopped
    networks:
      - lobslab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lobslab-home.rule=Host(`home.lobslab.com`)"
      - "traefik.http.routers.lobslab-home.entrypoints=web"
      - "traefik.http.services.lobslab-home.loadbalancer.server.port=3000"

networks:
  lobslab:
    name: lobslab
    external: true
