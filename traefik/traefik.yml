## traefik.yml — Static configuration

# Entrypoint: port 80 inside Docker (Cloudflare handles TLS)
entryPoints:
  web:
    address: ":80"

# Docker provider — auto-discover containers via labels
providers:
  docker:
    exposedByDefault: false
    network: lobslab
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# API / Dashboard — insecure mode exposes the API on :8080 inside the Docker
# network so lobslab-home can query it. It is NOT reachable externally —
# cloudflared only routes to port 80 (Traefik's web entrypoint).
api:
  dashboard: true
  insecure: true

# Access logs
accessLog: {}

# Main log
log:
  level: INFO
